name: entrocut-server

services:
  server:
    container_name: entrocut-server
    image: ${IMAGE_REF}
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--proxy-headers",
        "--forwarded-allow-ips=*",
      ]
    env_file:
      - .env.production
    environment:
      APP_ENV: staging
      SERVER_PORT: 8001
      REDIS_URL: redis://entrocut-redis:6379/0
      AUTH_DEV_FALLBACK_ENABLED: "false"
      ALLOW_INMEMORY_MONGO_FALLBACK: "false"
      ALLOW_INMEMORY_REDIS_FALLBACK: "false"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8001/livez >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    container_name: entrocut-redis
    image: ghcr.io/shaowenfu/redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
