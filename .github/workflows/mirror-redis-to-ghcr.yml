name: mirror-redis-to-ghcr

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  REDIS_SOURCE_IMAGE: redis:7-alpine
  REDIS_TARGET_IMAGE: ghcr.io/${{ github.repository_owner }}/redis:7-alpine

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Pull redis image from Docker Hub
        run: docker pull "${REDIS_SOURCE_IMAGE}"

      - name: Retag redis image for GHCR
        run: docker tag "${REDIS_SOURCE_IMAGE}" "${REDIS_TARGET_IMAGE}"

      - name: Push redis image to GHCR
        run: docker push "${REDIS_TARGET_IMAGE}"
