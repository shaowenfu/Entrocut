name: deploy-server

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"
      - "docker-compose.production.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/entrocut-server
  DEPLOY_DIR: /opt/entrocut-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Extract image metadata
        id: meta
        shell: bash
        run: |
          IMAGE_REF="${IMAGE_NAME}:${GITHUB_SHA}"
          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "${{ env.DEPLOY_DIR }}"

      - name: Deploy on ECS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PASSWORD: ${{ secrets.GH_PAT }}
          MONGODB_ATLAS_URI: ${{ secrets.MONGODB_ATLAS_URI }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DASHVECTOR_API_KEY: ${{ secrets.DASHVECTOR_API_KEY }}
          DASHVECTOR_ENDPOINT: ${{ secrets.DASHVECTOR_ENDPOINT }}
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DEPLOY_DIR,IMAGE_REF,GHCR_USERNAME,GHCR_PASSWORD,MONGODB_ATLAS_URI,DASHSCOPE_API_KEY,DASHVECTOR_API_KEY,DASHVECTOR_ENDPOINT
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "${DEPLOY_DIR}"
            cd "${DEPLOY_DIR}"
            cat > .env.production <<EOF
            APP_ENV=production
            SERVER_PORT=8001
            SERVER_LOG_LEVEL=info
            SERVER_BASE_URL=${{ vars.SERVER_BASE_URL }}
            OBSERVABILITY_ENABLE_METRICS=true
            ALLOW_INMEMORY_MONGO_FALLBACK=false
            ALLOW_INMEMORY_REDIS_FALLBACK=false
            MONGODB_URI=${MONGODB_ATLAS_URI}
            MONGODB_DB_NAME=entrocut_server
            AUTH_JWT_ALGORITHM=HS256
            AUTH_JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}
            AUTH_ACCESS_TOKEN_EXPIRES_SECONDS=3600
            AUTH_REFRESH_TOKEN_EXPIRES_SECONDS=2592000
            AUTH_LOGIN_SESSION_TTL_SECONDS=600
            AUTH_DEEP_LINK_SCHEME=entrocut
            AUTH_TOKEN_ISSUER=entrocut-server
            AUTH_TOKEN_AUDIENCE=entrocut-core
            AUTH_DEV_FALLBACK_ENABLED=false
            AUTH_GOOGLE_CLIENT_ID=${{ secrets.AUTH_GOOGLE_CLIENT_ID }}
            AUTH_GOOGLE_CLIENT_SECRET=${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}
            AUTH_GOOGLE_SCOPE=openid email profile
            CORS_ALLOW_ORIGINS=${{ vars.CORS_ALLOW_ORIGINS }}
            LLM_PROXY_MODE=google_gemini
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
            DASHSCOPE_MULTIMODAL_EMBEDDING_MODEL=qwen3-vl-embedding
            DASHSCOPE_MULTIMODAL_DIMENSION=1024
            DASHVECTOR_API_KEY=${DASHVECTOR_API_KEY}
            DASHVECTOR_ENDPOINT=${DASHVECTOR_ENDPOINT}
            DASHVECTOR_COLLECTION_NAME=entrocut_assets
            DASHVECTOR_PARTITION=default
            DASHVECTOR_TIMEOUT_SECONDS=10
            DASHVECTOR_PROTOCOL=grpc
            EOF
            echo "${GHCR_PASSWORD}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            export IMAGE_REF="${IMAGE_REF}"
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d
            for i in $(seq 1 30); do
              LIVE_CODE=$(curl --silent --output /dev/null --write-out "%{http_code}" http://127.0.0.1:8001/livez || true)
              READY_CODE=$(curl --silent --output /dev/null --write-out "%{http_code}" http://127.0.0.1:8001/readyz || true)
              if [ "${LIVE_CODE}" = "200" ] && [ "${READY_CODE}" = "200" ]; then
                echo "deploy_ready"
                exit 0
              fi
              sleep 2
            done
            docker compose -f docker-compose.production.yml ps
            docker compose -f docker-compose.production.yml logs --tail=200
            exit 1
