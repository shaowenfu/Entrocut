name: cleanup-ghcr

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

jobs:
  cleanup-container-images:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Delete stale GHCR versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const ownerType = context.payload.repository?.owner?.type || "User";
            const packageName = "entrocut-server";
            const listRoute = ownerType === "Organization"
              ? "GET /orgs/{org}/packages/{package_type}/{package_name}/versions"
              : "GET /users/{username}/packages/{package_type}/{package_name}/versions";
            const deleteRoute = ownerType === "Organization"
              ? "DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}"
              : "DELETE /users/{username}/packages/{package_type}/{package_name}/versions/{package_version_id}";
            const ownerKey = ownerType === "Organization" ? { org: owner } : { username: owner };

            let versions = [];
            try {
              const response = await github.request(listRoute, {
                ...ownerKey,
                package_type: "container",
                package_name: packageName,
                per_page: 100,
              });
              versions = response.data || [];
            } catch (error) {
              if (error.status === 404) {
                core.info(`GHCR package not found yet: ${packageName}. Skip cleanup.`);
                return;
              }
              throw error;
            }

            if (versions.length <= 2) {
              core.info(`Only ${versions.length} package version(s) found. Nothing to clean.`);
              return;
            }

            const sortedVersions = [...versions].sort((a, b) => {
              return new Date(b.created_at).getTime() - new Date(a.created_at).getTime();
            });
            const versionsToDelete = sortedVersions.slice(2);

            for (const version of versionsToDelete) {
              core.info(`Deleting GHCR version id=${version.id}`);
              await github.request(deleteRoute, {
                ...ownerKey,
                package_type: "container",
                package_name: packageName,
                package_version_id: version.id,
              });
            }
