name: Deploy Server to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG_LATEST: latest
  IMAGE_TAG_COMMIT: commit-${{ github.sha }}
  CONTAINER_NAME: entrocut-mock-server
  SERVER_PORT: 8001

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # Checkout 代码
      # ============================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================================
      # 设置 Docker Buildx
      # ============================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================
      # 登录 GitHub Container Registry
      # ============================================
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # 构建并推送镜像到 GHCR
      # ============================================
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG_LATEST }}
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG_COMMIT }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      # ============================================
      # 获取短 SHA 用于标签
      # ============================================
      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ============================================
      # 部署到阿里云 ECS（直接注入环境变量）
      # ============================================
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script_stop: false
          script: |
            echo "=========================================="
            echo "Deploying ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG_COMMIT }}"
            echo "=========================================="

            # 登录 GHCR
            echo "Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取最新镜像
            echo "Pulling new image..."
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG_COMMIT }}

            # 停止并删除旧容器
            echo "Stopping old container..."
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            # 启动新容器（环境变量直接从 GitHub Secrets 注入）
            echo "Starting new container with environment variables..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p 8001:8001 \
              --restart unless-stopped \
              -e SERVER_PORT=8001 \
              -e LOG_LEVEL=INFO \
              -e CONTRACT_VERSION=0.1.0-mock \
              -e DASHSCOPE_API_KEY="${{ secrets.DASHSCOPE_API_KEY }}" \
              -e DASHVECTOR_API_KEY="${{ secrets.DASHVECTOR_API_KEY }}" \
              -e DASHVECTOR_ENDPOINT="${{ secrets.DASHVECTOR_ENDPOINT }}" \
              -e MONGODB_URI="${{ secrets.MONGODB_ATLAS_URI }}" \
              -e MONGODB_DATABASE=entrocut \
              ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG_COMMIT }}

            # 清理 ECS 上的旧镜像（保留最新 2 个）
            echo "Cleaning up old images on ECS..."
            docker images ghcr.io/${{ env.IMAGE_NAME }} \
              --format "{{.ID}} {{.Tag}}" | \
              grep -v "<none>" | \
              sort -k2 -r | \
              tail -n +3 | \
              awk '{print $1}' | \
              xargs -r docker rmi -f || true

            # 健康检查
            echo "Running health check..."
            sleep 5
            for i in {1..10}; do
              if curl -f http://localhost:8001/health; then
                echo "Health check passed!"
                echo "Container is running on port 8001"
                exit 0
              fi
              echo "Health check attempt $i failed, retrying..."
              sleep 2
            done
            echo "Health check failed after 10 attempts!"
            docker logs ${{ env.CONTAINER_NAME }}
            exit 1

      # ============================================
      # 清理 GitHub 端旧镜像（保留最新 2 个）
      # ============================================
      - name: Delete old image versions from GHCR
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ env.IMAGE_NAME }}
          package-type: container
          min-versions-to-keep: 2
          delete-only-untagged-versions: false

      # ============================================
      # 部署成功通知
      # ============================================
      - name: Deployment summary
        if: success()
        run: |
          echo "=========================================="
          echo "Deployment completed successfully!"
          echo "Image: ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG_COMMIT }}"
          echo "Container: ${{ env.CONTAINER_NAME }}"
          echo "Port: ${{ env.SERVER_PORT }}"
          echo "=========================================="

      # ============================================
      # 部署失败通知
      # ============================================
      - name: Deployment failed
        if: failure()
        run: |
          echo "=========================================="
          echo "Deployment failed!"
          echo "Please check the logs above for details."
          echo "=========================================="
          exit 1
