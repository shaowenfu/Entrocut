name: client-build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: client

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run electron:build:win
          - os: macos-latest
            build_cmd: npm run electron:build:mac
          - os: ubuntu-latest
            build_cmd: npm run electron:build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install core dependencies
        working-directory: core
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install dependencies
        run: |
          node -e "const fs=require('fs'); const p='package-lock.json'; if(fs.existsSync(p)) fs.unlinkSync(p)"
          npm install

      - name: Build & package
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: entrocut-${{ runner.os }}
          path: |
            client/release/*.AppImage
            client/release/*.deb
            client/release/*.dmg
            client/release/*.exe
            client/release/*.zip
            client/release/*.blockmap
            client/release/latest*.yml

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: EntroCut ${{ github.ref_name }}
          files: release-assets/**/*
          fail_on_unmatched_files: true
